spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gigmatch
    username: ${DB_USER:-gigmatch}
    password: ${DB_PASSWORD:-gigmatch}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:-localhost}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          min-idle: 5

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        gigmatch.match.duration.ms: true
      percentiles:
        gigmatch.match.duration.ms: 0.5,0.95,0.99

gigmatch:
  matching:
    timeout-ms: 100
  async:
    bidder-core-pool-size: 20
    bidder-max-pool-size: 50
    bidder-queue-capacity: 100
    db-write-core-pool-size: 5
    db-write-max-pool-size: 10

logging:
  level:
    com.gigmatch: INFO
    org.hibernate.SQL: WARN
